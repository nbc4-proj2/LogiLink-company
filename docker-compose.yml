version: "3.9"
services:

  #  # Eureka Server
  eureka-server:
    env_file:
      - .env
    image: openjdk:17
    container_name: eureka-server
    build:
      context: ../LogiLink-eureka-server
      dockerfile: Dockerfile
    ports:
      - "19090:19090"
    networks:
      - logilink-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:19090/actuator/health" ]
      interval: 10s
      timeout: 5s
      retries: 5


  #  # Gateway
  #  gateway-service:
  #    env_file:
  #      - .env
  #    image: openjdk:17
  #    container_name: gateway-service
  #    build:
  #      context: ./gateway-service
  #      dockerfile: Dockerfile
  #    ports:
  #      - "19091:19091"
  #    environment:
  #      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
  #      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
  #    depends_on:
  #      eureka-server:
  #        condition: service_healthy
  #    networks:
  #      - logilink-network
  #    restart: always


  company-db:
    env_file:
      - .env
    image: postgres:17
    container_name: company-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    networks:
      - logilink-network
    restart: always
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 5s
      timeout: 3s
      retries: 5



  company-service:
    env_file:
      - .env
    build:
      context: .
      dockerfile: Dockerfile
    container_name: company-service
    ports:
      - "19093:19093"
    environment:
      DB_HOST: company-db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      SERVER_PORT: ${SERVER_PORT}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
    depends_on:
      eureka-server:
        condition: service_healthy
      company-db:
        condition: service_healthy
    networks:
      - logilink-network
    restart: always

  # 레디스
  redis:
    image: redis:7.2-alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - logilink-network

networks:
  logilink-network:
    driver: bridge